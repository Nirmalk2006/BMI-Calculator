<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="Bmi.css">
</head>
<body>
    <div id="header">
        <h1>BMI Calculator</h1>
    </div>
    <div id="container">
        <form class="form">
            <p><label>Enter Height in CM </label> <input type="text" name="" id="height" placeholder="Enter the Height"></p>
            <p><label>Enter weight in Kg</label> <input type="text" name="" id="weight" placeholder="Enter the Weight"></p>
            <button type="submit">Calculate</button>
        </form>
        <p><div id="results">Results: </div></p>
    </div>
</body>
<script src="Bmi.js"></script>
</html>
